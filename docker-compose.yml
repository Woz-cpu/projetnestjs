services:
  # ===========================================
  # BASE DE DONNÉES POSTGRESQL
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: app_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-app_db}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-app_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # REDIS (CACHE + QUEUES)
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: app_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6390}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # MAILPIT (SERVEUR MAIL LOCAL)
  # Interface web : http://localhost:8025
  # SMTP : localhost:1025
  # ===========================================
  mailpit:
    image: axllent/mailpit:latest
    container_name: app_mailpit
    restart: unless-stopped
    ports:
      - "${MAIL_WEB_PORT:-8026}:8025"  # Interface web
      - "${MAIL_SMTP_PORT:-1026}:1025" # SMTP
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  # ===========================================
  # BACKEND NESTJS
  # ===========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app_backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3001}:3000"
      - "5555:5555" # Port pour le débogage distant (si nécessaire)
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-app_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      # Origine autorisée pour le frontend (doit correspondre au port réel du front)
      CORS_ORIGIN: http://localhost:${FRONTEND_PORT:-5173}
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      # Monté pour que les modifs de tsconfig soient prises en compte sans rebuild
      - ./tsconfig.json:/app/tsconfig.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    command: npm run dev

  # ===========================================
  # FRONTEND VUEJS
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: app_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5174}:5173"
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-3001}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  redis_data:
